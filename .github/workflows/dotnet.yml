name: MovieCatalog

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore MovieCatalogApiTests.sln

    - name: Build
      run: dotnet build MovieCatalogApiTests.sln --no-restore --configuration Release

    - name: Run tests
      run: dotnet test MovieCatalogApiTests.sln --no-build --configuration Release --verbosity normal
